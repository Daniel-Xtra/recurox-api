# RabbitMQ Configuration for Fintech Monolith

# Basic management plugin and Prometheus support
loopback_users.guest = false
listeners.tcp.default = 5672
management.listener.port = 15672
management.listener.ssl = false

# Enable Prometheus metrics
prometheus.return_per_object_metrics = true

# Memory and Disk Limits (Conservative for local dev, increase for prod)
vm_memory_high_watermark.relative = 0.4
disk_free_limit.absolute = 1GB

# Default user/vhost logic should be handled via definitions.json for determinism
# but we can set default credentials here too
default_user = admin
default_pass = admin_password
default_vhost = /
