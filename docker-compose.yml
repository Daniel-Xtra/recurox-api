services:
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: recurox-mq
    hostname: recurox-mq
    ports:
      - "5672:5672"   # AMQP
      - "15672:15672" # Management UI
      - "15692:15692" # Prometheus metrics
    volumes:
      - ./docker/rabbitmq/conf/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf
      - ./docker/rabbitmq/conf/definitions.json:/etc/rabbitmq/definitions.json
      - rabbitmq_data:/var/lib/rabbitmq
    environment:
      - RABBITMQ_DEFAULT_USER=${RECUROX_RABBITMQ_USER:-admin}
      - RABBITMQ_DEFAULT_PASS=${RECUROX_RABBITMQ_PASS:-admin_password}
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  rabbitmq_data:
    driver: local
